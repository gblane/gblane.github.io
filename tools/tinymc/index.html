<!DOCTYPE html>
<html lang="en">
<head>
    <title>tinyMC — Giles Blaney</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 70px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">Giles Blaney, PhD</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html#bio">Bio</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../index.html#research">Research</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../index.html#teaching">Teaching</a></li>
                    <li class="nav-item"><a class="nav-link active" href="../../index.html#tools">Tools</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-1">tinyMC</h1>
        <p class="text-muted mb-4">3D random walk Monte Carlo simulator</p>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Parameters</h5>
                        <div class="mb-3">
                            <label for="number-input" class="form-label">Number of steps</label>
                            <input type="number" class="form-control" id="number-input" placeholder="e.g. 1000" min="1" value="1000">
                        </div>
                        <button id="calculate-button" class="btn btn-primary w-100">Calculate</button>
                        <div id="output" class="mt-2 text-muted small"></div>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-body">
                        <h6 class="card-title">About</h6>
                        <p class="card-text small">Simulates a 3D isotropic random walk by sampling step directions uniformly on the unit sphere, then plots the projected X–Y path.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div id="plot" style="height: 450px;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script>
        function runMC(n) {
            const x = new Array(n + 1);
            const y = new Array(n + 1);
            x[0] = 0; y[0] = 0;
            for (let i = 0; i < n; i++) {
                const theta = Math.acos(1 - 2 * Math.random());
                const phi   = 2 * Math.PI * Math.random();
                x[i + 1] = x[i] + Math.sin(theta) * Math.cos(phi);
                y[i + 1] = y[i] + Math.sin(theta) * Math.sin(phi);
            }
            return { x, y };
        }

        function plot(x, y) {
            Plotly.react("plot", [{
                x, y,
                mode: "lines",
                name: "Path",
                line: { width: 1 }
            }], {
                title: "tinyMC — Random Walk",
                xaxis: { title: "X Position" },
                yaxis: { title: "Y Position", scaleanchor: "x" },
                margin: { t: 50, r: 20, b: 50, l: 60 }
            }, { responsive: true });
        }

        document.getElementById("calculate-button").addEventListener("click", () => {
            const n = parseInt(document.getElementById("number-input").value);
            if (!n || n < 1) return;

            const output = document.getElementById("output");
            output.textContent = `Running ${n} steps...`;

            setTimeout(() => {
                const { x, y } = runMC(n);
                plot(x, y);
                output.textContent = `Done — ${n} steps plotted.`;
            }, 0);
        });
    </script>
</body>
</html>
