<!DOCTYPE html>
<html lang="en">
<head>
    <title>tinyMC — Giles Blaney</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../site.css" rel="stylesheet">
    <link rel="icon" href="data:,">
    <style>
        .param-label { font-size: 0.83rem; font-weight: 500; color: var(--text); margin-bottom: 0.4rem; display: block; }

        .form-control {
            border-color: var(--border);
            border-radius: 4px;
            font-size: 0.88rem;
            background: var(--bg);
            color: var(--text);
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(26,82,118,0.12);
            background: #fff;
        }

        .btn-run {
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 0.83rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.5rem 1rem;
            width: 100%;
            transition: background 0.15s;
            cursor: pointer;
        }
        .btn-run:hover { background: #144060; }

        .output-msg { font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }

        #plot { border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">Giles Blaney, PhD</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html#bio">Bio</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../index.html#research">Research</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../index.html#teaching">Teaching</a></li>
                    <li class="nav-item"><a class="nav-link active" href="../../index.html#tools">Tools</a></li>
                    <li class="nav-item"><a class="nav-link" href="../../dissertation/index.html">Dissertation</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tool-header">
            <div class="section-eyebrow">Monte Carlo</div>
            <h1 class="tool-title">tinyMC</h1>
            <p class="tool-subtitle">3D random walk simulator</p>
        </div>

        <div class="row g-3 mb-5">
            <div class="col-md-4">
                <div class="param-card">
                    <label class="param-label" for="number-input">Number of steps</label>
                    <input type="number" class="form-control mb-3" id="number-input" placeholder="e.g. 1000" min="1" value="1000">
                    <button id="calculate-button" class="btn-run">Run simulation</button>
                    <div id="output" class="output-msg"></div>
                </div>

                <div class="about-card">
                    <div class="about-title">About</div>
                    <p class="about-text">Simulates a 3D isotropic random walk by sampling step directions uniformly on the unit sphere, then plots the projected X–Y path.</p>
                </div>
            </div>

            <div class="col-md-8">
                <div id="plot" style="height: 460px;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script>
        function runMC(n) {
            const x = new Array(n + 1);
            const y = new Array(n + 1);
            x[0] = 0; y[0] = 0;
            for (let i = 0; i < n; i++) {
                const theta = Math.acos(1 - 2 * Math.random());
                const phi   = 2 * Math.PI * Math.random();
                x[i + 1] = x[i] + Math.sin(theta) * Math.cos(phi);
                y[i + 1] = y[i] + Math.sin(theta) * Math.sin(phi);
            }
            return { x, y };
        }

        function plot(x, y) {
            Plotly.react("plot", [{
                x, y,
                mode: "lines",
                name: "Path",
                line: { width: 1, color: "#1a5276" }
            }], {
                paper_bgcolor: "rgba(0,0,0,0)",
                plot_bgcolor:  "rgba(0,0,0,0)",
                font: { family: "DM Sans, sans-serif", size: 12, color: "#6b6b6b" },
                xaxis: { title: "X position", gridcolor: "#e0dcd6", zerolinecolor: "#c8c2bc" },
                yaxis: { title: "Y position", scaleanchor: "x", gridcolor: "#e0dcd6", zerolinecolor: "#c8c2bc" },
                margin: { t: 20, r: 20, b: 50, l: 60 }
            }, { responsive: true });
        }

        document.getElementById("calculate-button").addEventListener("click", () => {
            const n = parseInt(document.getElementById("number-input").value);
            if (!n || n < 1) return;

            const output = document.getElementById("output");
            output.textContent = `Running ${n} steps…`;

            setTimeout(() => {
                const { x, y } = runMC(n);
                plot(x, y);
                output.textContent = `Done — ${n} steps plotted.`;
            }, 0);
        });
    </script>
</body>
</html>
