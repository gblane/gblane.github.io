<!DOCTYPE html>
<html lang="en">
<head>
    <title>Publications · Giles Blaney</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light')document.documentElement.dataset.theme=t}catch(e){}</script>
    <meta name="author" content="Giles Blaney, PhD">
    <meta name="description" content="Peer-reviewed publications on FD-NIRS, dual-slope imaging, and calibration-free spectroscopy by Giles Blaney.">

    <!-- Open Graph / Twitter Card -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Publications · Giles Blaney">
    <meta property="og:description" content="Peer-reviewed publications on FD-NIRS, dual-slope imaging, and calibration-free spectroscopy.">
    <meta property="og:url" content="https://gbphd.com/research/publications/">
    <meta property="og:image" content="https://gbphd.com/img/research/flu.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Publications · Giles Blaney">
    <meta name="twitter:description" content="Peer-reviewed publications on FD-NIRS, dual-slope imaging, and calibration-free spectroscopy.">
    <meta name="twitter:image" content="https://gbphd.com/img/research/flu.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://api.semanticscholar.org">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="/site.css" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>
<body>

    <div data-include="navbar"></div>

    <div class="container">
        <div class="tool-header">
            <div class="section-eyebrow">Fetched from Semantic Scholar</div>
            <h1 class="tool-title">Publications</h1>
            <p class="tool-subtitle">Diffuse optical methods for physiological measurement in tissue: FD-NIRS, dual-slope imaging, and calibration-free spectroscopy.</p>
            <p class="tool-subtitle">
                For a complete list visit my
                <a href="https://scholar.google.com/citations?user=zous0mAAAAAJ&amp;hl=en" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">Google Scholar</a>.
                <button id="pub-refresh" class="pub-refresh" type="button" title="Re-fetch publications from Semantic Scholar">Refresh</button>
            </p>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="pub-col-heading">By citations · h-index selection</div>
                <div id="pubs-by-citations">
                    <div style="color:var(--muted); font-size:0.88rem;">Loading…</div>
                </div>
            </div>
            <div class="col-md-6 pub-col-divider">
                <div class="pub-col-heading">By date · past 5 years</div>
                <div id="pubs-by-date">
                    <div style="color:var(--muted); font-size:0.88rem;">Loading…</div>
                </div>
            </div>
        </div>
    </div>

    <div data-include="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/_partials/include.js" defer></script>
    <script>
        const CACHE_KEY = 'pubs_v1';
        const CACHE_TTL = 86400000;

        function loadPubs(forceRefresh) {
            if (!forceRefresh) {
                try {
                    const raw = localStorage.getItem(CACHE_KEY);
                    if (raw) {
                        const { ts, data } = JSON.parse(raw);
                        if (Date.now() - ts < CACHE_TTL) return Promise.resolve(data);
                    }
                } catch (_) {}
            }
            return fetch("https://api.semanticscholar.org/graph/v1/author/51904482/papers?fields=title,year,venue,authors,citationCount,openAccessPdf,externalIds&limit=1000")
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
                .then(data => {
                    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
                    return data;
                });
        }

        function safeHttpsUrl(value) {
            try {
                const url = new URL(String(value || ''));
                return url.protocol === 'https:' ? url.href : null;
            } catch (_) {
                return null;
            }
        }

        function sourceForPaper(p) {
            const doi = String(p.externalIds?.DOI || '').trim();
            if (doi) {
                const href = safeHttpsUrl(`https://doi.org/${doi}`);
                if (href) return { href, label: doi };
            }

            const pdfUrl = safeHttpsUrl(p.openAccessPdf?.url);
            if (pdfUrl) {
                const label = new URL(pdfUrl).hostname.replace(/^www\./, '');
                return { href: pdfUrl, label };
            }

            const paperId = String(p.paperId || '').trim();
            if (!paperId) return null;

            return {
                href: `https://www.semanticscholar.org/paper/${encodeURIComponent(paperId)}`,
                label: 'semanticscholar.org'
            };
        }

        function messageNode(text, link) {
            const div = document.createElement('div');
            div.style.color = 'var(--muted)';
            div.style.fontSize = '0.88rem';
            div.append(document.createTextNode(text));
            if (link) {
                div.append(document.createTextNode(' '));
                const a = document.createElement('a');
                a.href = link.href;
                a.className = 'pub-link';
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = link.label;
                div.append(a);
            }
            return div;
        }

        function renderPub(p) {
            const row = document.createElement('div');
            row.className = 'pub-row';

            const title = document.createElement('div');
            title.className = 'pub-title';
            title.textContent = p.title || 'Untitled publication';
            row.append(title);

            const names = (Array.isArray(p.authors) ? p.authors : [])
                .map(a => String(a?.name || '').trim())
                .filter(Boolean);
            const authors = names.length > 3 ? names.slice(0, 3).join(", ") + " et al." : names.join(", ");
            const authorsEl = document.createElement('div');
            authorsEl.className = 'pub-authors';
            authorsEl.textContent = authors || 'Authors unavailable';
            row.append(authorsEl);

            const venue = [p.venue, p.year].filter(Boolean).join(", ");
            const citationCount = Number.isFinite(Number(p.citationCount)) ? Number(p.citationCount) : 0;
            const citations = `${citationCount} citation${citationCount !== 1 ? 's' : ''}`;
            const metaText = [venue, citations].filter(Boolean).join(" · ");
            const meta = document.createElement('div');
            meta.className = 'pub-meta';
            if (metaText) meta.append(document.createTextNode(metaText));

            const source = sourceForPaper(p);
            if (source) {
                if (metaText) meta.append(document.createTextNode(' · '));
                const a = document.createElement('a');
                a.href = source.href;
                a.className = 'pub-link';
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = source.label;
                meta.append(a);
            }
            row.append(meta);

            return row;
        }

        function setLoading() {
            document.getElementById("pubs-by-citations").replaceChildren(messageNode('Loading...'));
            document.getElementById("pubs-by-date").replaceChildren(messageNode('Loading...'));
        }

        function render(forceRefresh) {
            setLoading();
            loadPubs(forceRefresh)
                .then(data => {
                    const papers = Array.isArray(data?.data) ? data.data : [];

                    const citationCount = p => Number.isFinite(Number(p.citationCount)) ? Number(p.citationCount) : 0;
                    const byCitations = [...papers].sort((a, b) => citationCount(b) - citationCount(a));
                    const hIndex = byCitations.reduce((h, p, i) => citationCount(p) >= i + 1 ? i + 1 : h, 0);
                    const citedPapers = byCitations.slice(0, hIndex);
                    document.getElementById("pubs-by-citations").replaceChildren(
                        ...(citedPapers.length ? citedPapers.map(renderPub) : [messageNode('No publications found.')]
                    ));

                    const cutoff = new Date().getFullYear() - 5;
                    const byDate = [...papers]
                        .filter(p => (p.year ?? 0) >= cutoff)
                        .sort((a, b) => (b.year ?? 0) - (a.year ?? 0));
                    document.getElementById("pubs-by-date").replaceChildren(
                        ...(byDate.length ? byDate.map(renderPub) : [messageNode('No publications found.')]
                    ));
                })
                .catch(err => {
                    console.error("Publications fetch failed:", err);
                    const fallback = () => messageNode('Unable to load publications.', {
                        href: 'https://scholar.google.com/citations?user=zous0mAAAAAJ&hl=en',
                        label: 'View on Google Scholar'
                    });
                    document.getElementById("pubs-by-citations").replaceChildren(fallback());
                    document.getElementById("pubs-by-date").replaceChildren(fallback());
                });
        }

        document.getElementById('pub-refresh').addEventListener('click', () => {
            try { localStorage.removeItem(CACHE_KEY); } catch (_) {}
            render(true);
        });

        render(false);
    </script>
</body>
</html>
